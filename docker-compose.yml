name: ${COMPOSE_PROJECT_NAME:-vue-api}

services:
  backend:
    image: ${BACKEND_IMAGE:-ghcr.io/your-org/vue-api-backend:local}
    build:
      context: .
      dockerfile: backend/Dockerfile
    environment:
      APP_ENV: ${APP_ENV:-development}
      APP_NAME: ${APP_NAME:-Vue API Workbench}
      BACKEND_ADDR: :8080
      BACKEND_PUBLIC_URL: ${BACKEND_PUBLIC_URL:-http://localhost:8080}
      FRONTEND_ORIGIN: ${FRONTEND_ORIGIN:-http://localhost:3000}
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:-http://localhost:3000,http://127.0.0.1:3000}
      DATABASE_DRIVER: ${DATABASE_DRIVER:-sqlite}
      DATABASE_URL: ${COMPOSE_DATABASE_URL:-file:/data/my.local.db}
      DATABASE_AUTH_TOKEN: ${DATABASE_AUTH_TOKEN:-}
      SESSION_SECRET: ${SESSION_SECRET:-dev-only-change-me}
      PASSWORD_PEPPER: ${PASSWORD_PEPPER:-}
    ports:
      - "${BACKEND_PORT:-8080}:8080"
    volumes:
      - sqlite-data:/data
    healthcheck:
      test: ["CMD", "/app/backend", "healthcheck"]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 10s

  frontend:
    image: ${FRONTEND_IMAGE:-ghcr.io/your-org/vue-api-frontend:local}
    build:
      context: .
      dockerfile: frontend/Dockerfile
    environment:
      HOST: 0.0.0.0
      PORT: 3000
      NUXT_PUBLIC_APP_NAME: ${NUXT_PUBLIC_APP_NAME:-Vue API Workbench}
      NUXT_API_BASE_URL: ${COMPOSE_NUXT_API_BASE_URL:-http://backend:8080}
    ports:
      - "${FRONTEND_PORT:-3000}:3000"
    depends_on:
      backend:
        condition: service_healthy

volumes:
  sqlite-data:
